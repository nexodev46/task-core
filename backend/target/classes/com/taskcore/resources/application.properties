# ============================================================
# Task Core - Configuración de la aplicación
# ============================================================

# Servidor
server.port=8080

# ============================================================
# Base de datos PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/taskcore
spring.datasource.username=postgres
spring.datasource.password=tu_contraseña
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (Hibernate)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# JWT (JSON Web Token)
# ============================================================
jwt.secret=taskcore_secret_key_minimo_32_caracteres_para_hs256
jwt.expiration=86400000          # 24 horas en milisegundos

# ============================================================
# Configuración de correo (para recuperar contraseña)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu_email@gmail.com
spring.mail.password=tu_contraseña_aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# URL base del frontend para enlaces en correos
frontend.url=http://localhost:5173

# ============================================================
# Logging
# ============================================================
logging.level.com.taskcore=DEBUG
logging.level.org.springframework.security=INFO

# ============================================================
# Tamaño máximo de archivos (subidas)
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# Swagger/OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html